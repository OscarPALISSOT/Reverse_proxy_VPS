services:
  caddy-global:
    image: caddy:latest
    container_name: caddy-global
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge-network

networks:
  edge-network:
    external: true

volumes:
  caddy_data:
  caddy_config: